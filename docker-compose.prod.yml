# docker-compose.prod.yml — застосовується поверх базового.
# Підключення (один раз при деплої, далі всі команди підхоплюють автоматично):
#   echo "COMPOSE_FILE=docker-compose.yml:docker-compose.prod.yml" >> .env
# Потребує Docker Compose v2.24.4+ (тег !override).
#
# restart: always і бінди на 127.0.0.1 вже задані в базовому файлі;
# CORS_ORIGINS задається у .env. Тут — лише те, що відрізняється у проді.
services:
  db:
    # порт назовні не публікуємо взагалі у проді (навіть на 127.0.0.1).
    # Просто `ports: []` НЕ працює — списки мерджаться додаванням,
    # тому потрібен тег !override.
    ports: !override []
