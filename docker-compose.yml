services:
  db:
    image: postgres:16-alpine
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      # Тільки локально/через VPN — не світимо БД у мережу
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_web
    restart: always
    # Опційний інструмент: запуск лише з --profile tools, доступ через localhost/VPN
    profiles: ["tools"]
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "127.0.0.1:5050:80"
    depends_on:
      - db

  etl_worker:
    build: .
    container_name: etl_pipeline_worker
    restart: on-failure
    # Не стартує разом зі стеком (не жере Groq-квоту на кожному up).
    # Запуск вручну: docker compose run --rm etl_worker
    profiles: ["manual"]
    env_file:
      - .env
    environment:
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy

  api:
    build: .
    container_name: labor_market_api
    restart: always
    env_file:
      - .env
    environment:
      DB_HOST: db
    ports:
      - "127.0.0.1:8000:8000"
    command: ["uvicorn", "src.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - default
      - homelab

  frontend:
    build: ./frontend
    container_name: labor_market_frontend
    restart: always
    ports:
      # Лише локально/через reverse-proxy (Caddy у мережі homelab) — не світимо
      # фронтенд (і його /api-проксі) у мережу відкритим HTTP в обхід TLS.
      - "127.0.0.1:5173:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - default
      - homelab

volumes:
  postgres_data:

networks:
  homelab:
    external: true
