server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    resolver 127.0.0.11 valid=10s;

    # ─── Security headers ────────────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # HSTS додає Caddy на рівні TLS; тут не дублюємо
    server_tokens off;

    location /api/ {
        set $backend http://labor_market_api:8000;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Клієнт не має права ставити CF-заголовок — інакше він підробить IP
        # для rate-limiter. Ставить його лише справжній Cloudflare (якщо є).
        proxy_set_header CF-Connecting-IP "";
    }

    location /health {
        set $backend http://labor_market_api:8000;
        proxy_pass $backend;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
