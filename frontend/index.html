<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="503Work — аналітика ринку праці в Україні" />
    <!-- Шрифти самохостяться (public/fonts): без CDN інтерфейс однаковий на
         будь-якому пристрої й працює офлайн; субсети latin + cyrillic(-ext)
         покривають українську (і, ї, є, ґ). -->
    <link rel="preload" href="/fonts/ibm-plex-sans-400-cyrillic.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/ibm-plex-sans-400-latin.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="stylesheet" href="/fonts/fonts.css" />
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('503work.theme');
          var system = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          var theme = saved || system;
          if (theme === 'dark') document.documentElement.classList.add('dark');
        } catch (_) {}
      })();
    </script>
    <title>503Work — Labor Market Analytics</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
